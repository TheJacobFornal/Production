services:
  sqlserver-test:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: promate-test-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ProMate_Test123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ProMate_Test123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
